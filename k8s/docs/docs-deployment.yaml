apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugo-docs
  namespace: docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hugo-docs
  template:
    metadata:
      labels:
        app: hugo-docs
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: site-content
          mountPath: /usr/share/nginx/html
      volumes:
      - name: site-content
        emptyDir: {}
